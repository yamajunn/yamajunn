name: Update grass terrain

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours (UTC)
  workflow_dispatch:

concurrency:
  group: update-grass-terrain
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-grass-terrain:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate grass terrain SVG
        env:
          PROFILE_TOKEN: ${{ secrets.PROFILE_TOKEN }}
        run: python scripts/generate_grass_terrain.py

      - name: Commit and push if changed
        run: |
          # git config user.name "yamajunn"
          # git config user.email "c1502123@st.kanazawa-it.ac.jp"

          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi

          git add assets/grass_terrain.svg
          git commit -m "Update grass terrain"
          git push
